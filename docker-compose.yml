services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-denarius}
      POSTGRES_USER: ${POSTGRES_USER:-denarius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-denarius}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-denarius}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-denarius}:${POSTGRES_PASSWORD:-denarius}@db:5432/${POSTGRES_DB:-denarius}
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn core.wsgi:application
             --bind 0.0.0.0:8000
             --workers 2
             --timeout 120
             --access-logfile -
             --error-logfile -"

volumes:
  postgres_data:
