{% extends 'base_app.html' %}

{% block title %}Excluir Conta{% endblock %}

{% block app_content %}
<div class="p-4 sm:p-6">

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 sm:p-6 w-full max-w-md">
    <h2 class="text-lg font-semibold text-gray-800 mb-2">Confirmar exclusão</h2>
    <p class="text-sm text-gray-600 mb-6">
      Tem certeza que deseja excluir <strong>{{ object }}</strong>? Esta ação não pode ser desfeita.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="flex flex-col sm:flex-row gap-3">
        <button type="submit"
                class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2.5 sm:py-2
                       bg-red-600 hover:bg-red-700 text-white text-sm font-medium
                       rounded-lg transition-colors duration-200">
          Excluir
        </button>
        <a href="{% url 'accounts:list' %}"
           class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2.5 sm:py-2
                  border border-gray-300 bg-white hover:bg-gray-50 text-gray-700
                  text-sm font-medium rounded-lg transition-colors duration-200">
          Cancelar
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
