{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-screen bg-gray-50 dark:bg-[#0f172a] transition-colors duration-200">

  {% include 'partials/_sidebar.html' %}

  <!-- Overlay para fechar o menu móvel -->
  <div id="sidebar-overlay"
       class="fixed inset-0 bg-black/40 z-20 hidden md:hidden"
       onclick="closeSidebar()">
  </div>

  <div class="flex-1 min-w-0 flex flex-col">

    <!-- Topbar móvel -->
    <header class="md:hidden bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between shrink-0 sticky top-0 z-10 transition-colors duration-200">
      <button type="button"
              onclick="openSidebar()"
              class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:text-emerald-700 dark:hover:text-white hover:bg-emerald-50 dark:hover:bg-emerald-900 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-emerald-500"
              aria-label="Abrir menu">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <span class="text-lg font-bold bg-gradient-to-r from-emerald-600 to-teal-500 dark:from-emerald-400 dark:to-teal-300 bg-clip-text text-transparent">
        Denarius
      </span>

      <!-- Acesso rápido: Nova Transação -->
      <a href="{% url 'transactions:create' %}"
         class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:text-emerald-700 dark:hover:text-white hover:bg-emerald-50 dark:hover:bg-emerald-900 transition-colors duration-200"
         title="Nova Transação">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
      </a>
    </header>

    <main class="flex-1 min-w-0 overflow-y-auto">
      {% block app_content %}{% endblock %}
    </main>

  </div>

</div>

<!-- Modal de confirmação de exclusão -->
<div id="delete-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/50 dark:bg-black/70" onclick="closeDeleteModal()"></div>
  <!-- Card do modal -->
  <div class="relative bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-gray-200 dark:border-slate-700 p-6 w-full max-w-md text-center">
    <div class="w-12 h-12 bg-red-100 dark:bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>
    <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-2" id="delete-modal-title">Confirmar exclusão</h3>
    <p class="text-sm text-gray-500 dark:text-slate-400 mb-6" id="delete-modal-body">Esta ação não pode ser desfeita.</p>
    <form id="delete-modal-form" method="post">
      {% csrf_token %}
      <div class="flex items-center gap-3 justify-center">
        <button type="submit"
                class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
          Excluir
        </button>
        <button type="button" onclick="closeDeleteModal()"
                class="px-5 py-2 text-sm font-medium text-gray-600 dark:text-slate-300 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-lg transition-colors duration-200">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function openDeleteModal(url, title, body) {
    document.getElementById('delete-modal-form').action = url;
    document.getElementById('delete-modal-title').textContent = title || 'Confirmar exclusão';
    document.getElementById('delete-modal-body').textContent = body || 'Esta ação não pode ser desfeita.';
    var modal = document.getElementById('delete-modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.body.style.overflow = 'hidden';
  }
  function closeDeleteModal() {
    var modal = document.getElementById('delete-modal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    document.body.style.overflow = '';
  }

  function openSidebar() {
    document.getElementById('mobile-sidebar').classList.remove('-translate-x-full');
    document.getElementById('sidebar-overlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeSidebar() {
    document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
    document.getElementById('sidebar-overlay').classList.add('hidden');
    document.body.style.overflow = '';
  }

  // Fechar modal de exclusão e sidebar com Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeDeleteModal();
      closeSidebar();
    }
  });
</script>
{% endblock %}
