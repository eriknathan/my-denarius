{% extends 'base_app.html' %}

{% block title %}Excluir Meta{% endblock %}

{% block app_content %}
<div class="p-4 sm:p-6">
  <div class="max-w-md mx-auto">

    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 p-6 text-center transition-colors duration-200">

      <div class="w-12 h-12 bg-red-100 dark:bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </div>

      <h1 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-2">Excluir meta de orçamento?</h1>
      <p class="text-sm text-gray-500 dark:text-slate-400 mb-6">
        A meta <strong class="text-gray-700 dark:text-gray-200">{{ object.category.name }} — {{ object.month|date:"m/Y" }}</strong>
        será excluída permanentemente. Esta ação não pode ser desfeita.
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="flex flex-col sm:flex-row items-center gap-3 justify-center">
          <button type="submit"
                  class="w-full sm:w-auto px-5 py-2.5 sm:py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
            Sim, excluir
          </button>
          <a href="{% url 'budgets:list' %}"
             class="w-full sm:w-auto inline-flex items-center justify-center px-5 py-2.5 sm:py-2 text-sm font-medium text-gray-700 dark:text-slate-200 border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 rounded-lg transition-colors duration-200">
            Cancelar
          </a>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
