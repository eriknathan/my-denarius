{% if is_paginated %}
<nav class="flex items-center justify-between mt-6 px-1" aria-label="Paginação">

  <p class="text-sm text-gray-500 dark:text-slate-400">
    Página <span class="font-medium text-gray-700 dark:text-gray-200">{{ page_obj.number }}</span>
    de <span class="font-medium text-gray-700 dark:text-gray-200">{{ page_obj.paginator.num_pages }}</span>
  </p>

  <div class="flex gap-2">
    {% if page_obj.has_previous %}
      <a href="?page={{ page_obj.previous_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}"
         class="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium rounded-lg
                border border-gray-300 dark:border-slate-600
                text-gray-700 dark:text-gray-300
                bg-white dark:bg-slate-800
                hover:bg-gray-50 dark:hover:bg-slate-700
                transition-colors duration-150">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Anterior
      </a>
    {% endif %}

    {% if page_obj.has_next %}
      <a href="?page={{ page_obj.next_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}"
         class="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium rounded-lg
                border border-gray-300 dark:border-slate-600
                text-gray-700 dark:text-gray-300
                bg-white dark:bg-slate-800
                hover:bg-gray-50 dark:hover:bg-slate-700
                transition-colors duration-150">
        Próxima
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </a>
    {% endif %}
  </div>

</nav>
{% endif %}
