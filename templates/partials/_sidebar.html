<aside class="w-64 bg-white border-r border-gray-200 min-h-screen flex flex-col shrink-0">

  <!-- Logo -->
  <div class="px-6 py-5 border-b border-gray-200">
    <span class="text-xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent">
      my-denarius
    </span>
  </div>

  <!-- Navegação principal -->
  <nav class="flex-1 px-4 py-4 space-y-1">

    <!-- Dashboard -->
    <a href="{% url 'dashboard:index' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200
              {% if request.resolver_match.app_name == 'dashboard' %}
                bg-emerald-50 text-emerald-700
              {% else %}
                text-gray-600 hover:bg-emerald-50 hover:text-emerald-700
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Dashboard
    </a>

    <!-- Contas -->
    <a href="{% url 'accounts:list' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200
              {% if request.resolver_match.app_name == 'accounts' %}
                bg-emerald-50 text-emerald-700
              {% else %}
                text-gray-600 hover:bg-emerald-50 hover:text-emerald-700
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
      </svg>
      Contas
    </a>

    <!-- Categorias -->
    <a href="{% url 'categories:list' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200
              {% if request.resolver_match.app_name == 'categories' %}
                bg-emerald-50 text-emerald-700
              {% else %}
                text-gray-600 hover:bg-emerald-50 hover:text-emerald-700
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
      </svg>
      Categorias
    </a>

    <!-- Transações -->
    <a href="{% url 'transactions:list' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200
              {% if request.resolver_match.app_name == 'transactions' %}
                bg-emerald-50 text-emerald-700
              {% else %}
                text-gray-600 hover:bg-emerald-50 hover:text-emerald-700
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
      </svg>
      Transações
    </a>

    <!-- Perfil -->
    <a href="{% url 'profiles:detail' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200
              {% if request.resolver_match.app_name == 'profiles' %}
                bg-emerald-50 text-emerald-700
              {% else %}
                text-gray-600 hover:bg-emerald-50 hover:text-emerald-700
              {% endif %}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      Perfil
    </a>

  </nav>

  <!-- Logout -->
  <div class="px-4 py-4 border-t border-gray-200">
    <a href="{% url 'users:logout' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium
              text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors duration-200">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sair
    </a>
  </div>

</aside>
