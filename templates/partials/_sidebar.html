<!-- Sidebar desktop (oculta em mobile, visível em md+) -->
<aside class="hidden md:flex w-64 bg-white border-r border-gray-200 min-h-screen flex-col shrink-0 sticky top-0 self-start h-screen">
  {% include 'partials/_sidebar_nav.html' %}
</aside>

<!-- Sidebar móvel (drawer) -->
<aside id="mobile-sidebar"
       class="fixed top-0 left-0 h-full w-72 bg-white border-r border-gray-200 flex flex-col z-30
              transform -translate-x-full transition-transform duration-300 ease-in-out md:hidden"
       aria-label="Menu de navegação">

  <!-- Cabeçalho do drawer -->
  <div class="px-6 py-5 border-b border-gray-200 flex items-center justify-between shrink-0">
    <span class="text-xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent">
      my-denarius
    </span>
    <button type="button"
            onclick="closeSidebar()"
            class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            aria-label="Fechar menu">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  {% include 'partials/_sidebar_nav.html' %}
</aside>
