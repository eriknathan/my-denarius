</div>

          </svg>
        </div>
        <!-- Ícone Lua -->
        <div class="relative z-10 flex items-center justify-center w-[30px] h-7">
          <svg class="w-4 h-4 text-gray-300 dark:text-white transition-colors duration-300" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>

    </div>
