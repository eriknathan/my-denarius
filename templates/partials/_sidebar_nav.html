<!-- Navegação principal -->
<div class="flex-1 overflow-y-auto">
  
  <!-- Seção: MENU PRINCIPAL -->
  <div class="px-5 pt-2 pb-2">
    <h3 class="text-[10px] font-bold tracking-widest text-gray-400 dark:text-slate-500 uppercase mb-2 px-3 transition-colors duration-200">
      Menu Principal
    </h3>
    
    <nav class="space-y-0.5">
      <!-- Dashboard -->
      <a href="{% url 'dashboard' %}"
         onclick="closeSidebar()"
         class="group flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
                {% if request.resolver_match.url_name == 'dashboard' %}
                  bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400
                {% else %}
                  text-gray-600 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-800/60 hover:text-gray-900 dark:hover:text-slate-200
                {% endif %}">
        <svg class="w-5 h-5 shrink-0 transition-colors duration-200 {% if request.resolver_match.url_name == 'dashboard' %}text-emerald-600 dark:text-emerald-400{% else %}text-gray-400 dark:text-slate-500 group-hover:text-gray-600 dark:group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      <!-- Contas -->
      <a href="{% url 'accounts:list' %}"
         onclick="closeSidebar()"
         class="group flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
                {% if request.resolver_match.app_name == 'accounts' %}
                  bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400
                {% else %}
                  text-gray-600 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-800/60 hover:text-gray-900 dark:hover:text-slate-200
                {% endif %}">
        <svg class="w-5 h-5 shrink-0 transition-colors duration-200 {% if request.resolver_match.app_name == 'accounts' %}text-emerald-600 dark:text-emerald-400{% else %}text-gray-400 dark:text-slate-500 group-hover:text-gray-600 dark:group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
        </svg>
        Contas
      </a>

      <!-- Categorias -->
      <a href="{% url 'categories:list' %}"
         onclick="closeSidebar()"
         class="group flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
                {% if request.resolver_match.app_name == 'categories' %}
                  bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400
                {% else %}
                  text-gray-600 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-800/60 hover:text-gray-900 dark:hover:text-slate-200
                {% endif %}">
        <svg class="w-5 h-5 shrink-0 transition-colors duration-200 {% if request.resolver_match.app_name == 'categories' %}text-emerald-600 dark:text-emerald-400{% else %}text-gray-400 dark:text-slate-500 group-hover:text-gray-600 dark:group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
        </svg>
        Categorias
      </a>

      <!-- Transações -->
      <a href="{% url 'transactions:list' %}"
         onclick="closeSidebar()"
         class="group flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
                {% if request.resolver_match.app_name == 'transactions' %}
                  bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400
                {% else %}
                  text-gray-600 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-800/60 hover:text-gray-900 dark:hover:text-slate-200
                {% endif %}">
        <svg class="w-5 h-5 shrink-0 transition-colors duration-200 {% if request.resolver_match.app_name == 'transactions' %}text-emerald-600 dark:text-emerald-400{% else %}text-gray-400 dark:text-slate-500 group-hover:text-gray-600 dark:group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
        </svg>
        Transações
      </a>
    </nav>
  </div>

  <!-- Seção: OUTROS -->
  <div class="px-5 pt-4 pb-2">
    <h3 class="text-[10px] font-bold tracking-widest text-gray-400 dark:text-slate-500 uppercase mb-2 px-3 transition-colors duration-200">
      Outros
    </h3>
    
    <nav class="space-y-0.5">
      <!-- Perfil -->
      <a href="{% url 'profiles:detail' %}"
         onclick="closeSidebar()"
         class="group flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
                {% if request.resolver_match.app_name == 'profiles' %}
                  bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400
                {% else %}
                  text-gray-600 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-800/60 hover:text-gray-900 dark:hover:text-slate-200
                {% endif %}">
        <svg class="w-5 h-5 shrink-0 transition-colors duration-200 {% if request.resolver_match.app_name == 'profiles' %}text-emerald-600 dark:text-emerald-400{% else %}text-gray-400 dark:text-slate-500 group-hover:text-gray-600 dark:group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Edição de Perfil
      </a>

      <!-- Assistente IA -->
      <a href="{% url 'chat:index' %}"
         onclick="closeSidebar()"
         class="group flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
                {% if request.resolver_match.app_name == 'chat' %}
                  bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400
                {% else %}
                  text-gray-600 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-800/60 hover:text-gray-900 dark:hover:text-slate-200
                {% endif %}">
        <svg class="w-5 h-5 shrink-0 transition-colors duration-200 {% if request.resolver_match.app_name == 'chat' %}text-emerald-600 dark:text-emerald-400{% else %}text-gray-400 dark:text-slate-500 group-hover:text-gray-600 dark:group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Assistente IA
      </a>
    </nav>
  </div>
</div>

<!-- Seção Inferior: Perfil de Usuário -->
<div class="p-5 pt-4 shrink-0">
  <div class="bg-gradient-to-br from-emerald-800 to-emerald-900 dark:from-slate-800 dark:to-slate-800/80 rounded-2xl p-4 text-white relative shadow-lg border border-emerald-700/30 dark:border-slate-700/50">
    
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-xl bg-white/10 text-white flex items-center justify-center font-bold text-lg shrink-0 relative border border-white/10">
        {{ request.user.first_name|default:request.user.email|make_list|first|upper }}
        <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-emerald-400 rounded-full border-[1.5px] border-emerald-800 dark:border-slate-800"></span>
      </div>
      <div class="flex flex-col min-w-0 flex-1 mt-0.5">
        <span class="text-sm font-semibold tracking-tight truncate pr-8">
          {{ request.user.first_name|default:"Usuário" }}
        </span>
        <span class="text-[11px] text-emerald-200/70 dark:text-slate-400 truncate">
          Membro Denarius
        </span>
      </div>
    </div>
    
    <!-- Logout icon button floating top right -->
    <a href="{% url 'users:logout' %}" title="Sair do sistema" 
       class="absolute top-4 right-4 p-1.5 text-emerald-200/50 dark:text-slate-400 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
    </a>
    
    <div class="mt-3 pt-3 border-t border-white/10">
      <span class="block text-[10px] text-emerald-200/50 dark:text-slate-500 mb-0.5">E-mail</span>
      <span class="block text-xs font-medium text-emerald-50 dark:text-slate-300 truncate">
        {{ request.user.email }}
      </span>
    </div>

  </div>
</div>
