{% extends 'base_app.html' %}

{% block title %}Excluir Transação{% endblock %}

{% block app_content %}
<div class="p-4 sm:p-6">

  <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 p-4 sm:p-6 w-full max-w-md transition-colors duration-200">
    <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-2">Confirmar exclusão</h2>
    <p class="text-sm text-gray-600 dark:text-slate-400 mb-6">
      Tem certeza que deseja excluir <strong class="dark:text-gray-200">{{ object.description }}</strong>
      (R$ {{ object.amount }})? Esta ação não pode ser desfeita.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="flex flex-col sm:flex-row gap-3">
        <button type="submit"
                class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2.5 sm:py-2
                       bg-red-600 hover:bg-red-700 text-white text-sm font-medium
                       rounded-lg transition-colors duration-200">
          Excluir
        </button>
        <a href="{% url 'transactions:list' %}"
           class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2.5 sm:py-2
                  border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 text-gray-700 dark:text-slate-200
                  text-sm font-medium rounded-lg transition-colors duration-200">
          Cancelar
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
