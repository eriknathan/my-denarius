{% extends 'base_app.html' %}

{% block title %}Excluir Transação{% endblock %}

{% block app_content %}
<div class="p-6">

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 max-w-md">
    <h2 class="text-lg font-semibold text-gray-800 mb-2">Confirmar exclusão</h2>
    <p class="text-sm text-gray-600 mb-6">
      Tem certeza que deseja excluir <strong>{{ object.description }}</strong>
      (R$ {{ object.amount }})? Esta ação não pode ser desfeita.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3">
        <button type="submit"
                class="inline-flex items-center px-4 py-2 bg-red-600 hover:bg-red-700
                       text-white text-sm font-medium rounded-lg transition-colors duration-200">
          Excluir
        </button>
        <a href="{% url 'transactions:list' %}"
           class="inline-flex items-center px-4 py-2 border border-gray-300
                  bg-white hover:bg-gray-50 text-gray-700 text-sm font-medium
                  rounded-lg transition-colors duration-200">
          Cancelar
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
