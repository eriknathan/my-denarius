{% extends 'base.html' %}

{% block title %}Senha redefinida{% endblock %}

{% block content %}
<div class="relative min-h-screen bg-gray-50 dark:bg-[#0f172a] flex items-center justify-center px-4 py-12 transition-colors duration-200">

  <!-- Toggle de tema -->
  <div class="absolute top-4 right-4">
    <button onclick="toggleTheme()"
            class="p-2 rounded-lg text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors duration-200"
            title="Alternar tema">
      <svg id="theme-icon-light" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M18.364 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
      </svg>
      <svg id="theme-icon-dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
      </svg>
    </button>
  </div>

  <div class="w-full max-w-md text-center">

    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 p-8">
      <div class="w-14 h-14 bg-emerald-100 dark:bg-emerald-900/20 rounded-full flex items-center justify-center mx-auto mb-5">
        <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100 mb-2">Senha redefinida!</h1>
      <p class="text-sm text-gray-500 dark:text-slate-400 mb-6">
        Sua senha foi alterada com sucesso. Agora você pode entrar com a nova senha.
      </p>
      <a href="{% url 'users:login' %}"
         class="inline-block px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2">
        Ir para o login
      </a>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var isDark = document.documentElement.classList.contains('dark');
    var iconLight = document.getElementById('theme-icon-light');
    var iconDark = document.getElementById('theme-icon-dark');
    if (iconLight && iconDark) {
      if (isDark) {
        iconLight.classList.remove('hidden');
        iconDark.classList.add('hidden');
      } else {
        iconLight.classList.add('hidden');
        iconDark.classList.remove('hidden');
      }
    }
  });

  var _origToggleTheme = window.toggleTheme;
  window.toggleTheme = function() {
    _origToggleTheme();
    var isDark = document.documentElement.classList.contains('dark');
    var iconLight = document.getElementById('theme-icon-light');
    var iconDark = document.getElementById('theme-icon-dark');
    if (iconLight && iconDark) {
      if (isDark) {
        iconLight.classList.remove('hidden');
        iconDark.classList.add('hidden');
      } else {
        iconLight.classList.add('hidden');
        iconDark.classList.remove('hidden');
      }
    }
  };
</script>
{% endblock %}
